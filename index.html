<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共同募集・リーズ案件資料共有サイト</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
            --radius: 12px;
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--primary);
            padding: 0 24px;
            box-shadow: 0 2px 8px rgba(37,99,235,0.3);
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
            height: 60px;
        }
        .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .logo-icon {
            width: 34px; height: 34px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
        }
        .logo-text { font-size: 15px; font-weight: 700; color: white; }
        .search-wrap { flex: 1; max-width: 420px; position: relative; }
        .search-icon {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            color: #94a3b8; font-size: 14px; pointer-events: none;
        }
        .search-input {
            width: 100%; padding: 9px 12px 9px 38px;
            border: none; border-radius: 9px; font-size: 13px;
            outline: none; background: white; font-family: inherit;
        }
        .search-input::placeholder { color: #94a3b8; }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .refresh-btn {
            width: 34px; height: 34px; border-radius: 8px;
            background: rgba(255,255,255,0.15); border: none;
            cursor: pointer; font-size: 15px; color: white;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.25); }
        .header-info { font-size: 11px; color: rgba(255,255,255,0.65); white-space: nowrap; }

        /* ===== CASE TABS ===== */
        .case-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 90;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .case-nav-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            gap: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .case-nav-inner::-webkit-scrollbar { display: none; }
        .case-tab {
            padding: 14px 22px;
            border: none; background: none;
            cursor: pointer; font-family: inherit;
            font-size: 14px; font-weight: 600;
            color: var(--text-muted);
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: all 0.15s;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .case-tab:hover { color: var(--primary); background: #f8fafc; }
        .case-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: var(--primary-light);
        }
        .case-tab-label { font-size: 15px; font-weight: 800; }
        .case-tab-sub { font-size: 10px; font-weight: 400; color: inherit; opacity: 0.8; max-width: 80px; text-align: center; line-height: 1.2; }

        /* ===== MAIN ===== */
        .main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 24px 48px;
        }

        /* ===== FOLDER TABS ===== */
        .folder-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .folder-tab {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-size: 13px; font-weight: 500;
            cursor: pointer; font-family: inherit;
            color: var(--text-muted);
            transition: all 0.15s;
            display: flex; align-items: center; gap: 6px;
        }
        .folder-tab:hover { border-color: var(--primary); color: var(--primary); }
        .folder-tab.active {
            background: var(--primary); border-color: var(--primary);
            color: white; font-weight: 600;
        }
        .folder-tab-icon { font-size: 14px; }

        /* ===== TOOLBAR ===== */
        .toolbar {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 16px; gap: 12px;
        }
        .file-count { font-size: 13px; color: var(--text-muted); }
        .sort-select {
            padding: 7px 12px; border: 1.5px solid var(--border);
            border-radius: 8px; font-size: 13px;
            background: var(--surface); cursor: pointer;
            outline: none; font-family: inherit; color: var(--text);
        }
        .sort-select:focus { border-color: var(--primary); }

        /* ===== SPECIAL MESSAGE (MC) ===== */
        .special-box {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 32px;
            text-align: center;
            margin-top: 8px;
        }
        .special-icon { font-size: 56px; margin-bottom: 20px; }
        .special-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
        .special-desc { font-size: 15px; color: var(--text-muted); line-height: 1.8; margin-bottom: 28px; }
        .special-link {
            display: inline-block;
            padding: 12px 32px;
            background: var(--primary);
            color: white; border-radius: 10px;
            text-decoration: none; font-size: 14px; font-weight: 700;
            transition: background 0.15s;
        }
        .special-link:hover { background: #1d4ed8; }

        /* ===== CONFIG NOTICE ===== */
        .config-notice {
            background: #fffbeb; border: 1.5px solid #fcd34d;
            border-radius: var(--radius); padding: 20px 24px; margin-bottom: 24px;
        }
        .config-notice h3 { font-size: 15px; font-weight: 700; color: #92400e; margin-bottom: 8px; }
        .config-notice p { font-size: 13px; color: #78350f; line-height: 1.7; }
        .config-notice code {
            background: rgba(0,0,0,0.08); padding: 2px 6px; border-radius: 4px;
            font-family: 'Courier New', monospace; font-size: 12px;
        }

        /* ===== ERROR ===== */
        .error-banner {
            background: #fef2f2; border: 1.5px solid #fecaca;
            border-radius: var(--radius); padding: 14px 18px;
            color: #dc2626; font-size: 14px;
            margin-bottom: 20px;
            display: flex; align-items: flex-start; gap: 10px;
        }

        /* ===== FILE GRID ===== */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 14px;
        }
        .file-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden; cursor: pointer;
            display: flex; flex-direction: column;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
        }
        .file-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }
        .file-preview {
            height: 100px;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .file-preview img.thumb { width: 100%; height: 100%; object-fit: cover; }
        .file-icon-emoji { font-size: 38px; line-height: 1; }
        .file-type-badge {
            position: absolute; top: 8px; right: 8px;
            padding: 3px 7px; border-radius: 5px;
            font-size: 10px; font-weight: 800;
            letter-spacing: 0.4px; color: white;
        }
        .file-info { padding: 11px 13px; border-top: 1px solid var(--border); flex: 1; }
        .file-name {
            font-size: 12px; font-weight: 600; color: var(--text);
            line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; margin-bottom: 5px;
        }
        .file-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 8px; }
        .file-actions {
            padding: 9px 13px; border-top: 1px solid var(--border);
            display: flex; gap: 7px;
        }
        .btn {
            flex: 1; padding: 7px 0; border-radius: 8px;
            font-size: 12px; font-weight: 600;
            cursor: pointer; text-align: center; text-decoration: none;
            transition: all 0.15s; border: none; font-family: inherit; display: block;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-outline {
            background: transparent; color: var(--primary);
            border: 1.5px solid var(--primary);
        }
        .btn-outline:hover { background: var(--primary-light); }

        /* ===== LOADING ===== */
        .loading { text-align: center; padding: 60px 24px; color: var(--text-muted); }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== EMPTY ===== */
        .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
        .empty-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.5; }
        .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
        .empty-desc { font-size: 13px; }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center; padding: 20px;
            font-size: 11px; color: var(--text-muted);
            border-top: 1px solid var(--border); margin-top: 24px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .header-inner { height: auto; flex-wrap: wrap; padding: 10px 0; gap: 8px; }
            .search-wrap { order: 3; max-width: 100%; width: 100%; }
            .header-info { display: none; }
            .case-tab { padding: 12px 14px; }
            .case-tab-sub { display: none; }
            .file-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
            .main { padding: 14px 12px 48px; }
        }
    </style>
</head>
<body>

<script>
// ===== ファイルタイプ定義 =====
const FILE_TYPES = {
    'application/pdf':
        { label: 'PDF', color: '#dc2626', bg: '#fff1f1', emoji: '📄', category: 'doc' },
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document':
        { label: 'DOCX', color: '#2563eb', bg: '#eff6ff', emoji: '📝', category: 'doc' },
    'application/msword':
        { label: 'DOC', color: '#2563eb', bg: '#eff6ff', emoji: '📝', category: 'doc' },
    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':
        { label: 'XLSX', color: '#16a34a', bg: '#f0fdf4', emoji: '📊', category: 'sheet' },
    'application/vnd.ms-excel':
        { label: 'XLS', color: '#16a34a', bg: '#f0fdf4', emoji: '📊', category: 'sheet' },
    'application/vnd.openxmlformats-officedocument.presentationml.presentation':
        { label: 'PPTX', color: '#ea580c', bg: '#fff7ed', emoji: '📑', category: 'slide' },
    'application/vnd.ms-powerpoint':
        { label: 'PPT', color: '#ea580c', bg: '#fff7ed', emoji: '📑', category: 'slide' },
    'image/jpeg': { label: 'JPG', color: '#7c3aed', bg: '#f5f3ff', emoji: '🖼️', category: 'image' },
    'image/png':  { label: 'PNG', color: '#7c3aed', bg: '#f5f3ff', emoji: '🖼️', category: 'image' },
    'image/gif':  { label: 'GIF', color: '#7c3aed', bg: '#f5f3ff', emoji: '🖼️', category: 'image' },
    'application/vnd.google-apps.document':
        { label: 'Docs', color: '#2563eb', bg: '#eff6ff', emoji: '📝', category: 'doc' },
    'application/vnd.google-apps.spreadsheet':
        { label: 'Sheets', color: '#16a34a', bg: '#f0fdf4', emoji: '📊', category: 'sheet' },
    'application/vnd.google-apps.presentation':
        { label: 'Slides', color: '#ea580c', bg: '#fff7ed', emoji: '📑', category: 'slide' },
};
function getFileType(mimeType) {
    return FILE_TYPES[mimeType] || { label: 'FILE', color: '#64748b', bg: '#f8fafc', emoji: '📄', category: 'other' };
}

// ===== 状態管理 =====
let currentCase   = null;
let currentFolder = null;
let currentSearch = '';
let currentSort   = 'modifiedTime desc';
let filesCache    = {};  // folderId → files[]

// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', () => {
    document.title = CONFIG.siteTitle;
    document.getElementById('site-title').textContent = CONFIG.siteTitle;
    document.getElementById('footer-text').textContent = CONFIG.siteTitle;

    if (CONFIG.apiKey === 'AIzaSyD2LdqiJU24wzjxzqXenPjGaYHpAYVG5gQ') {
        document.getElementById('config-notice').style.display = 'block';
    }

    document.getElementById('search').addEventListener('input', e => {
        currentSearch = e.target.value.toLowerCase();
        renderFiles();
    });

    document.getElementById('refresh-btn').addEventListener('click', () => {
        if (currentFolder) {
            delete filesCache[currentFolder.id];
            fetchFiles(currentFolder.id);
        }
        const now = new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        document.getElementById('last-updated').textContent = `更新: ${now}`;
    });

    renderCaseTabs();
    // 最初のケースを選択
    selectCase(CONFIG.cases[0]);
});

// ===== 案件タブ描画 =====
function renderCaseTabs() {
    const container = document.getElementById('case-tabs');
    container.innerHTML = CONFIG.cases.map(c => `
        <button class="case-tab ${currentCase?.id === c.id ? 'active' : ''}"
                onclick="selectCase(CONFIG.cases.find(x=>x.id==='${c.id}'))">
            <span class="case-tab-label">${escapeHtml(c.label)}</span>
            <span class="case-tab-sub">${escapeHtml(c.fullName)}</span>
        </button>
    `).join('');
}

// ===== 案件選択 =====
function selectCase(cas) {
    currentCase = cas;
    currentSearch = '';
    document.getElementById('search').value = '';
    renderCaseTabs();

    if (cas.type === 'special') {
        renderSpecial(cas);
    } else {
        currentFolder = cas.folders[0];
        renderNormalLayout(cas);
        if (currentFolder) {
            if (filesCache[currentFolder.id]) {
                renderFiles();
            } else {
                fetchFiles(currentFolder.id);
            }
        }
    }
}

// ===== サブフォルダ選択 =====
function selectFolder(folderIdx) {
    currentFolder = currentCase.folders[folderIdx];
    currentSearch = '';
    document.getElementById('search').value = '';
    renderFolderTabs();
    if (filesCache[currentFolder.id]) {
        renderFiles();
    } else {
        fetchFiles(currentFolder.id);
    }
}

// ===== 特別表示（MC）=====
function renderSpecial(cas) {
    const linkHtml = cas.link
        ? `<a href="${escapeHtml(cas.link)}" class="special-link" target="_blank">${escapeHtml(cas.linkLabel || 'リンクを開く')}</a>`
        : '';
    const lines = cas.message.split('\n').map(l => escapeHtml(l)).join('<br>');
    document.getElementById('content-area').innerHTML = `
        <div class="special-box">
            <div class="special-icon">📋</div>
            <div class="special-title">${escapeHtml(cas.label)} 案件について</div>
            <div class="special-desc">${lines}</div>
            ${linkHtml}
        </div>
    `;
}

// ===== 通常レイアウト描画 =====
function renderNormalLayout(cas) {
    document.getElementById('content-area').innerHTML = `
        <div class="folder-nav" id="folder-nav"></div>
        <div class="toolbar">
            <span class="file-count" id="file-count"></span>
            <select class="sort-select" id="sort-select">
                <option value="modifiedTime desc">更新日（新しい順）</option>
                <option value="modifiedTime asc">更新日（古い順）</option>
                <option value="name asc">ファイル名（昇順）</option>
                <option value="name desc">ファイル名（降順）</option>
            </select>
        </div>
        <div id="file-grid" class="file-grid"></div>
        <div class="loading" id="loading"><div class="spinner"></div><p>読み込み中...</p></div>
        <div class="empty-state" id="empty-state" style="display:none">
            <div class="empty-icon">📂</div>
            <div class="empty-title">ファイルが見つかりません</div>
            <div class="empty-desc" id="empty-desc">このフォルダにはまだファイルがありません。</div>
        </div>
    `;
    document.getElementById('sort-select').value = currentSort;
    document.getElementById('sort-select').addEventListener('change', e => {
        currentSort = e.target.value;
        filesCache = {};
        fetchFiles(currentFolder.id);
    });
    renderFolderTabs();
}

// ===== フォルダタブ描画 =====
function renderFolderTabs() {
    const container = document.getElementById('folder-nav');
    if (!container || !currentCase?.folders) return;
    container.innerHTML = currentCase.folders.map((f, i) => `
        <button class="folder-tab ${currentFolder?.id === f.id ? 'active' : ''}"
                onclick="selectFolder(${i})">
            <span class="folder-tab-icon">📂</span>
            ${escapeHtml(f.name)}
        </button>
    `).join('');
}

// ===== ファイル取得 =====
async function fetchFiles(folderId) {
    const loadingEl = document.getElementById('loading');
    const gridEl    = document.getElementById('file-grid');
    if (loadingEl) { loadingEl.style.display = 'block'; }
    if (gridEl)    { gridEl.style.display = 'none'; }
    hideError();

    const [sortField, sortDir] = currentSort.split(' ');
    const url = new URL('https://www.googleapis.com/drive/v3/files');
    url.searchParams.set('q', `'${folderId}' in parents and trashed=false`);
    url.searchParams.set('fields', 'files(id,name,mimeType,size,modifiedTime,webViewLink,thumbnailLink)');
    url.searchParams.set('orderBy', `${sortField} ${sortDir}`);
    url.searchParams.set('pageSize', String(CONFIG.maxResults));
    url.searchParams.set('key', CONFIG.apiKey);

    try {
        const res = await fetch(url.toString());
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            const msg = err.error?.message || `HTTPエラー ${res.status}`;
            if (res.status === 403) throw new Error(`アクセス拒否: ${msg}`);
            if (res.status === 400) throw new Error(`リクエストエラー: ${msg}（フォルダIDをご確認ください）`);
            throw new Error(msg);
        }
        const data = await res.json();
        filesCache[folderId] = data.files || [];

        const now = new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        document.getElementById('last-updated').textContent = `更新: ${now}`;

        renderFiles();
    } catch (err) {
        showError(err.message);
        if (loadingEl) loadingEl.style.display = 'none';
        if (gridEl)    gridEl.style.display = 'grid';
    }
}

// ===== ファイル描画 =====
function renderFiles() {
    const loadingEl = document.getElementById('loading');
    const gridEl    = document.getElementById('file-grid');
    const emptyEl   = document.getElementById('empty-state');
    const countEl   = document.getElementById('file-count');
    if (!gridEl) return;

    if (loadingEl) loadingEl.style.display = 'none';
    gridEl.style.display = 'grid';

    const allFiles = filesCache[currentFolder?.id] || [];
    const filtered = allFiles.filter(f =>
        !currentSearch || f.name.toLowerCase().includes(currentSearch)
    );

    if (countEl) countEl.textContent = `${filtered.length} 件`;

    if (filtered.length === 0) {
        gridEl.innerHTML = '';
        if (emptyEl) {
            emptyEl.style.display = 'block';
            const descEl = document.getElementById('empty-desc');
            if (descEl) descEl.textContent = currentSearch
                ? `"${currentSearch}" に一致するファイルが見つかりません。`
                : 'このフォルダにはまだファイルがありません。';
        }
        return;
    }

    if (emptyEl) emptyEl.style.display = 'none';
    gridEl.innerHTML = filtered.map(f => createCard(f)).join('');
}

// ===== カード生成 =====
function createCard(file) {
    const ft = getFileType(file.mimeType);
    const isGoogleNative = file.mimeType?.startsWith('application/vnd.google-apps.');
    const isImage = file.mimeType?.startsWith('image/');
    const date = file.modifiedTime
        ? new Date(file.modifiedTime).toLocaleDateString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric' })
        : '';
    const size = file.size ? formatSize(parseInt(file.size)) : '';
    const viewUrl = file.webViewLink || `https://drive.google.com/file/d/${file.id}/view`;
    const downloadUrl = isGoogleNative ? null : `https://drive.google.com/uc?export=download&id=${file.id}`;

    let previewHTML;
    if (isImage && file.thumbnailLink) {
        previewHTML = `
            <img class="thumb" src="${file.thumbnailLink}" alt="${escapeHtml(file.name)}" loading="lazy"
                 onerror="this.parentNode.innerHTML='<span class=\\"file-icon-emoji\\">${ft.emoji}</span>'">
            <span class="file-type-badge" style="background:${ft.color}">${ft.label}</span>`;
    } else {
        previewHTML = `
            <span class="file-icon-emoji">${ft.emoji}</span>
            <span class="file-type-badge" style="background:${ft.color}">${ft.label}</span>`;
    }

    const downloadBtn = downloadUrl
        ? `<a href="${downloadUrl}" class="btn btn-outline" target="_blank" onclick="event.stopPropagation()">保存</a>`
        : '';

    return `
        <div class="file-card" onclick="window.open('${viewUrl}', '_blank')">
            <div class="file-preview" style="background:${ft.bg}">${previewHTML}</div>
            <div class="file-info">
                <div class="file-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</div>
                <div class="file-meta">
                    <span>${date}</span>${size ? `<span>${size}</span>` : ''}
                </div>
            </div>
            <div class="file-actions">
                <a href="${viewUrl}" class="btn btn-primary" target="_blank" onclick="event.stopPropagation()">開く</a>
                ${downloadBtn}
            </div>
        </div>`;
}

// ===== ユーティリティ =====
function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showError(msg) {
    const b = document.getElementById('error-banner');
    document.getElementById('error-msg').textContent = msg;
    b.style.display = 'flex';
}
function hideError() {
    const b = document.getElementById('error-banner');
    if (b) b.style.display = 'none';
}
</script>
